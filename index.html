    function useReveal() {
      React.useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        const io = new IntersectionObserver((entries) => {
          for (const e of entries) {
            if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
          }
        }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    // ---------- Hero ----------
    function HeroStage() {
      const ref = React.useRef(null);
      const [mood, setMood] = React.useState("idle");
      React.useEffect(() => {
        const el = ref.current; if (!el) return;
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        const onMove = (ev) => {
          const r = el.getBoundingClientRect();
          const x = (ev.clientX - r.left) / r.width - 0.5;
          const y = (ev.clientY - r.top) / r.height - 0.5;
          el.style.setProperty("--tilt-y", (x * 14) + "deg");
          el.style.setProperty("--tilt-x", (-y * 14) + "deg");
          el.style.setProperty("--plx-x", (x * 18) + "px");
          el.style.setProperty("--plx-y", (y * 18) + "px");
        };
        const onLeave = () => {
          el.style.setProperty("--tilt-y", "0deg");
          el.style.setProperty("--tilt-x", "0deg");
          el.style.setProperty("--plx-x", "0px");
          el.style.setProperty("--plx-y", "0px");
        };
        window.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
        return () => { window.removeEventListener("mousemove", onMove); el.removeEventListener("mouseleave", onLeave); };
      }, []);
      React.useEffect(() => {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        const moods = ["idle", "smile", "curious"];
        let i = 0;
        const timer = window.setInterval(() => {
          i = (i + 1) % moods.length;
          setMood(moods[i]);
        }, 4200);
        return () => window.clearInterval(timer);
      }, []);

    function BentoCard({ size, icon, title, body, href }) {

        const x = (ev.clientX - r.left) / r.width - 0.5;

    function StepScene({ scene, active }) {

    function HowItWorks() {
      const [active, setActive] = React.useState(0);
      const refs = React.useRef([]);
      React.useEffect(() => {
        const update = () => {
          const viewportFocus = window.innerHeight * 0.48;
          let bestIndex = 0;
          let bestDistance = Infinity;
          refs.current.forEach((el, idx) => {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const center = rect.top + rect.height * 0.42;
            const distance = Math.abs(center - viewportFocus);
            const visible = rect.bottom > window.innerHeight * 0.18 && rect.top < window.innerHeight * 0.78;
            if (visible && distance < bestDistance) {
              bestDistance = distance;
              bestIndex = idx;
            }
          });
          setActive(bestIndex);
        };
        update();
        window.addEventListener("scroll", update, { passive: true });
        window.addEventListener("resize", update);
        return () => {
          window.removeEventListener("scroll", update);
          window.removeEventListener("resize", update);
        };
      }, []);
      return (
        <section id="process" className="how">
          <div className="container">
            <div className="section-head reveal">
              <span className="num">02 — Process</span>
              <h2>Five steps.<br />One rule: <span style={{ color: "var(--jgc-glow-300)" }}>slow down, understand the problem, then act.</span></h2>
              <p>Good technology advice starts with context. The aim is to avoid rushed purchases, unsafe shortcuts, and unnecessary complexity.</p>
            </div>
            <div className="grid">
              <div className="steps">

                  <div ref={el => (refs.current[i] = el)}
                       key={i}
                       className={"step" + (i === active ? " active" : "")}>
                    <span className="stepnum">{s.n}</span>
                    <h3>{s.t}</h3>
                    <p>{s.b}</p>
                  </div>
                ))}
              </div>
              <div>
                <div className="stick">
                  <div className="stick-card">
                    <span className="stepnum">{STEPS[active].n}</span>
                    <StepScene scene={STEPS[active].scene} active={active} />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

      "Forms and enquiry systems",
      "Email cleanup and organisation",
      "AI automation",
      "Small business tech advice",
      "Scam or security concern",
      "Something else",
    ];
    const URGENCY_OPTS = [
      { val: "No rush", label: "No rush" },
      { val: "Soon — within a fortnight", label: "Soon — within a fortnight" },
      { val: "Fairly urgent — within a few days", label: "Fairly urgent — a few days" },
    ];

    function TogglePills({ label, options, value, onChange }) {
      return (
        <div className="field">
          <label>{label}</label>
          <div className="pill-group">
            {options.map(opt => {
              const active = value === (opt.val || opt);
              return (
                <button type="button" key={opt.val || opt}
                  onClick={() => onChange(opt.val || opt)}
                  className={"pill-option" + (active ? " active" : "")}>
                  {opt.label || opt}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function Contact() {
      const [s, setS] = React.useState(EMPTY_FORM);
      const [status, setStatus] = React.useState("idle"); // idle | sending | sent | error
      const markEditing = () => {
        if (status === "sent" || status === "error") setStatus("idle");
      };
      const u = (k) => (e) => {
        markEditing();
        setS(prev => ({ ...prev, [k]: e.target.value }));
      };
      const set = (k, v) => {
        markEditing();
        setS(prev => ({ ...prev, [k]: v }));
      };
      const submit = (e) => {
        e.preventDefault();
        if (!s.consent) return;
        setStatus("sending");
        emailjs.send("service_59pweih", "template_wnuvasi", {
          from_name:    s.name,
          from_email:   s.email,
          phone:        s.phone || "Not provided",
          enquiry_type: s.enquiry_type || "Not specified",
          service:      s.service || "Not specified",
          urgency:      s.urgency || "Not specified",
          message:      s.message,
        })
        .then(() => { setStatus("sent"); setS(EMPTY_FORM); })
        .catch(() => setStatus("error"));
      };
      return (
        <section id="contact" className="contact">
          <div className="container">
            <div className="grid">
              <div className="copy reveal">
                <div className="section-head" style={{ marginBottom: 0 }}>
                  <span className="num">03 — Get in touch</span>
                </div>
                <h2>Send through what's going on,<br />and I'll help work out the next step.</h2>
                <p>You do not need to explain it perfectly. Start with the problem, the goal, or the thing that feels messy. I only use these details to respond to your enquiry.</p>
                <div className="facts">
                  <div className="fact"><span className="dot"></span>Free while we're refining the service.</div>
                  <div className="fact"><span className="dot"></span>Computer help, websites, forms, email, AI workflows and small-business technology decisions.</div>
                  <div className="fact"><span className="dot"></span>Replies are written in plain English and focused on the next practical step.</div>
                  <div className="fact"><span className="dot"></span>If this needs a specialist, I'll say so clearly.</div>
                </div>
                <div className="intake-side-panel">
                  <div>
                    <span className="panel-kicker">What happens next</span>
                    <strong>A tailored response, sent back by email.</strong>
                  </div>
                  <ol>
                    <li>You send through an enquiry by email.</li>
                    <li>A personal, tailored response is prepared.</li>
                    <li>A practical reply is sent back to you.</li>
                  </ol>
                  <p>Please do not send passwords, banking codes, MFA codes, or sensitive access details through this form.</p>
                </div>
                <div className="quiet" style={{ marginTop: 28 }}>
                  Or write to <a href="mailto:hello@jgusewcomputers.com" style={{ color: "#fff", textDecoration: "underline", textUnderlineOffset: 3 }}>hello@jgusewcomputers.com</a>
                </div>
              </div>
              <form className="glass-form reveal d2" onSubmit={submit}>
                <div className="form-topline">
                  <div>
                    <span className="form-kicker">Intake console</span>
                    <h3>Start with the situation.</h3>
                  </div>
                  <span className="secure-chip">Private enquiry</span>
                </div>
                <p className="form-helper">A few structured details help me respond properly. Leave anything optional blank if you are not sure.</p>

                <div className="row">
                  <div className="field">
                    <label htmlFor="f-name">Your name</label>
                    <input id="f-name" value={s.name} onChange={u("name")} placeholder="Sarah Hughes" required />
                  </div>
                  <div className="field">
                    <label htmlFor="f-email">Email</label>
                    <input id="f-email" type="email" value={s.email} onChange={u("email")} placeholder="sarah@example.com.au" required />
                  </div>
                </div>

                <TogglePills
                  label="This is for"
                  options={["Home / personal", "Small business"]}
                  value={s.enquiry_type}
                  onChange={v => set("enquiry_type", s.enquiry_type === v ? "" : v)}
                />

                <div className="field">
                  <label htmlFor="f-service">What do you need help with?</label>
                  <select id="f-service" className={s.service ? "has-value" : ""} value={s.service} onChange={u("service")}>
                    <option value="" disabled>Select a service area…</option>
                    {SERVICES.map(sv => <option key={sv} value={sv}>{sv}</option>)}
                  </select>
                  <span className="helper-line">Choose the closest match. "Something else" is fine.</span>
                </div>

                <TogglePills
                  label="How soon do you need a response?"
                  options={URGENCY_OPTS}
                  value={s.urgency}
                  onChange={v => set("urgency", s.urgency === v ? "" : v)}
                />

                <div className="field">
                  <label htmlFor="f-phone">Phone (optional)</label>
                  <input id="f-phone" value={s.phone} onChange={u("phone")} placeholder="Optional" />
                </div>

                <div className="field">
                  <label htmlFor="f-message">What's going on?</label>
                  <textarea id="f-message" value={s.message} onChange={u("message")} placeholder="A plain-English description of what you've noticed. Don't include passwords, banking codes, or identity documents." required></textarea>
                  <span className="helper-line">You do not need to diagnose it. Describe what happened, what changed, and what you want to achieve.</span>
                </div>

                <div className="donot">
                  <strong>Please don't send:</strong> passwords · banking codes · one-time / MFA codes · credit card numbers · full identity documents · sensitive private documents.
                </div>

                <label className="consent-row">
                  <input type="checkbox" checked={s.consent} onChange={e => set("consent", e.target.checked)} required />
                  <span>
                    I understand JGusew Computers will use my contact details to respond to this enquiry.{" "}
                    I've read the <a href="privacy.html" style={{ color: "#fff", textDecoration: "underline", textUnderlineOffset: 3 }}>privacy notice</a>.
                  </span>
                </label>

                <div className="submit">
                  <span className="note">No marketing list. No passwords needed. See <a href="safety.html">Safety</a>.</span>
                  <button className="btn primary" type="submit" disabled={status === "sending" || status === "sent" || !s.consent}>
                    {status === "sending" ? "Sending…" : status === "sent" ? "Sent — thanks." : <><span>Send enquiry</span><Arrow /></>}
                  </button>
                </div>
                {status === "sent" && (
                  <div className="form-state success">
                    Thanks — your enquiry has been sent. I’ll read it and reply by email, usually within one working day.
                  </div>
                )}
                {status === "error" && (
                  <div className="form-state error">
                    The message was not sent. Please try again, or write directly to{" "}
                    <a href="mailto:hello@jgusewcomputers.com" style={{ color: "#fff", textDecoration: "underline" }}>hello@jgusewcomputers.com</a>.
                  </div>
                )}
              </form>
            </div>
          </div>
        </section>
      );
    }

    // ---------- Footer ----------
    function Footer({ onNav }) {
      return (
        <footer className="foot">
          <div className="inner">
            <div className="brand">
              <img className="lockup" src="assets/logos/horizontal-lockup-dark.webp" alt="JGusew Computers" loading="lazy" />
              <p>Practical technology help, advice, and automation for everyday people and small businesses.</p>
              <div className="badges">
                <span>Free during launch</span>
                <span>Help by email</span>
                <span>Plain-English advice</span>
              </div>
            </div>
            <div>
              <h3>Services</h3>
              <ul>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>New computer advice</a></li>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>Website help</a></li>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>Forms and enquiry systems</a></li>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>Email cleanup</a></li>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>AI automation starter</a></li>
                <li><a href="#services" onClick={(e)=>{e.preventDefault();onNav("services");}}>Small business review</a></li>
              </ul>
            </div>
            <div>
              <h3>Trust</h3>
              <ul>
                <li><a href="#process" onClick={(e)=>{e.preventDefault();onNav("process");}}>How it works</a></li>
                <li><a href="safety.html">Safety first</a></li>
                <li><a href="#contact" onClick={(e)=>{e.preventDefault();onNav("contact");}}>Get in touch</a></li>
              </ul>
            </div>
            <div>
              <h3>About</h3>
              <ul>
                <li><a href="about.html">About Jehiah</a></li>
                <li><a href="safety.html">Safety first</a></li>
                <li><a href="privacy.html">Privacy notice</a></li>
              </ul>
            </div>
            <div>
              <h3>Contact</h3>
              <ul>
                <li><a href="mailto:hello@jgusewcomputers.com">hello@jgusewcomputers.com</a></li>
                <li style={{ opacity: 0.75 }}>Reply within 1 working day</li>
                <li style={{ opacity: 0.75 }}>Plain-English replies</li>
              </ul>
            </div>
          </div>
          <div className="legal">
            <span>© 2026 JGusew Computers · Sunbury, VIC, Australia</span>
            <span className="mono">
              <a href="safety.html" style={{color:"inherit",textDecoration:"underline",textUnderlineOffset:3}}>Safety</a>
              {" · "}
              <a href="privacy.html" style={{color:"inherit",textDecoration:"underline",textUnderlineOffset:3}}>Privacy notice</a>
            </span>
          </div>
        </footer>
      );
    }

    // ---------- App ----------
    function App() {
      const [current, setCurrent] = React.useState("home");
      useReveal();
      function nav(id) {
        setCurrent(id);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        else window.scrollTo({ top: 0, behavior: "smooth" });
      }
      return (
        <>
          <a href="#main-content" className="skip-link">Skip to main content</a>
          <DigitalRails />
          <Nav current={current} onNav={nav} />
          <main id="main-content">
            <div id="home" data-screen-label="01 Home">
              <Hero onContact={() => nav("contact")} onServices={() => nav("services")} />
            </div>

            <ExplainerBand />

            <section id="services" className="section" data-screen-label="02 Services">
              <div className="container">
                <div className="section-head reveal">
                  <span className="num">01 — Services</span>
                  <h2>Computers, websites, forms, email, AI automation and small business tech advice.</h2>
                  <p>We help assess the issue, explain your options, and suggest sensible next steps — in plain English. No guaranteed repairs, no emergency support, no instant fixes.</p>
                </div>
                <BentoServices />
              </div>
            </section>

            <HowItWorks />

            <AICallout />

            <JehiahNote />

            <SafetyBand />

            <Contact />
          </main>
          <Footer onNav={nav} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
