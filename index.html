<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JGusew Computers | Local Tech Help &amp; Professional Technology Services</title>
  <meta name="description" content="JGusew Computers — friendly local computer repairs and professional technology services in Sunbury VIC. Drag to compare community and professional sides.">
  <link rel="canonical" href="https://jgusewcomputers.com/">
  <link rel="icon" href="assets/logos/monogram-flat-navy.png">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://jgusewcomputers.com/">
  <meta property="og:site_name"   content="JGusew Computers">
  <meta property="og:locale"      content="en_AU">
  <meta property="og:title"       content="JGusew Computers | Local Tech Help &amp; Professional Technology Services">
  <meta property="og:description" content="Friendly local computer repairs and professional technology services in Sunbury VIC. Drag the slider to compare both sides.">
  <meta property="og:image"       content="https://jgusewcomputers.com/assets/logos/horizontal-lockup-light.png">
  <meta name="twitter:card"       content="summary_large_image">
  <meta name="twitter:title"      content="JGusew Computers | Local Tech Help &amp; Professional Technology Services">
  <meta name="twitter:description" content="Friendly local computer repairs and professional technology services. Drag to compare.">
  <meta name="twitter:image"      content="https://jgusewcomputers.com/assets/logos/horizontal-lockup-light.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #060f24;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* ---- Iframes ---- */
    .frames { position: fixed; inset: 0; }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    #frame-community    { z-index: 1; }
    #frame-professional { z-index: 2; }

    /* ---- Slider ---- */
    #comp-slider {
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      z-index: 1000;
      cursor: ew-resize;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Dual-tone vertical line: amber top → white → blue bottom */
    #comp-line {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      background: linear-gradient(
        180deg,
        transparent                     0%,
        rgba(249, 115, 22, 0.45)       10%,
        rgba(255, 255, 255, 0.55)      35%,
        rgba(255, 255, 255, 0.55)      65%,
        rgba(59,  130, 246, 0.45)      90%,
        transparent                    100%
      );
    }

    /* Split-glow handle: amber left · blue right */
    #comp-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px; height: 50px;
      border-radius: 50%;
      background: linear-gradient(
        90deg,
        rgba(249, 115, 22, 0.12) 0%,
        rgba(8,   14,  38, 0.84) 50%,
        rgba(59, 130, 246, 0.12) 100%
      );
      border: 1.5px solid rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.55),
        -8px 0 18px rgba(249,115,22,0.12),
          8px 0 18px rgba(59,130,246,0.12);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    #comp-slider:hover  #comp-handle,
    #comp-slider.active #comp-handle {
      transform: translate(-50%, -50%) scale(1.12);
      border-color: rgba(255, 255, 255, 0.40);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.65),
        -14px 0 28px rgba(249,115,22,0.22),
          14px 0 28px rgba(59,130,246,0.22);
    }

    /* ---- Entry cards (labels) ---- */
    .comp-label {
      position: fixed;
      top: 22px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-radius: 16px;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      transition: opacity 300ms ease, transform 200ms ease, box-shadow 200ms ease;
      cursor: pointer;
      max-width: 240px;
    }
    .comp-label:hover {
      transform: translateY(-1px);
    }

    .label-icon {
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
    }
    .label-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .label-title {
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .label-sub {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.2;
      opacity: 0.72;
    }
    .label-caret {
      font-size: 11px;
      opacity: 0.50;
      flex-shrink: 0;
      line-height: 1;
    }

    /* Community card — warm honey-orange */
    #label-community {
      left: 18px;
      background: rgba(249, 115, 22, 0.13);
      color: #fed7aa;
      border: 1px solid rgba(249, 115, 22, 0.30);
      box-shadow:
        0 2px 16px rgba(0,0,0,0.40),
        0 0  24px rgba(249,115,22,0.10);
    }
    #label-community:hover {
      background: rgba(249, 115, 22, 0.20);
      box-shadow:
        0 4px 20px rgba(0,0,0,0.45),
        0 0  28px rgba(249,115,22,0.18);
    }

    /* Professional card — cool cobalt */
    #label-professional {
      right: 18px;
      background: rgba(59, 130, 246, 0.13);
      color: #bfdbfe;
      border: 1px solid rgba(59, 130, 246, 0.30);
      box-shadow:
        0 2px 16px rgba(0,0,0,0.40),
        0 0  24px rgba(59,130,246,0.10);
    }
    #label-professional:hover {
      background: rgba(59, 130, 246, 0.20);
      box-shadow:
        0 4px 20px rgba(0,0,0,0.45),
        0 0  28px rgba(59,130,246,0.18);
    }

    /* ---- Drag hint ---- */
    #comp-hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 500ms ease;
    }

    /* ---- Mobile tab behaviour ---- */
    @media (max-width: 768px) {
      /* Both labels stay visible on mobile — active glows, inactive dims */
      .comp-label {
        transition: opacity 300ms ease, transform 220ms ease,
                    box-shadow 220ms ease, background 220ms ease,
                    border-color 220ms ease;
      }
      #label-community.active-tab {
        background: rgba(249, 115, 22, 0.24);
        border-color: rgba(249, 115, 22, 0.54);
        box-shadow:
          0 2px 16px rgba(0,0,0,0.40),
          0 0  32px rgba(249,115,22,0.30);
      }
      #label-professional.active-tab {
        background: rgba(59, 130, 246, 0.24);
        border-color: rgba(59, 130, 246, 0.54);
        box-shadow:
          0 2px 16px rgba(0,0,0,0.40),
          0 0  32px rgba(59,130,246,0.30);
      }
      .comp-label:not(.active-tab) { opacity: 0.40; transform: translateY(1px); }
    }

    @media (max-width: 640px) {
      #comp-hint { font-size: 10px; bottom: 18px; }
      .comp-label { padding: 8px 11px; top: 14px; }
      .label-title { font-size: 11px; }
      .label-sub { display: none; }
      #comp-handle { width: 42px; height: 42px; }
      /* Prevent labels from overlapping on small screens */
      #label-community    { left: 8px;  max-width: calc(50% - 22px); }
      #label-professional { right: 8px; max-width: calc(50% - 22px); }
    }
  </style>
</head>
<body>

  <div class="frames">
    <iframe id="frame-community"    src="/community"    title="Community — JGusew Computers"></iframe>
    <iframe id="frame-professional" src="/professional" title="Professional — JGusew Computers"></iframe>
  </div>

  <!-- Comparison slider -->
  <div id="comp-slider"
    role="slider" aria-label="Drag to compare community and professional views"
    aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
    <div id="comp-line"></div>
    <div id="comp-handle" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="rgba(255,255,255,0.70)" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l-6-6 6-6"/><path d="M15 6l6 6-6 6"/>
      </svg>
    </div>
  </div>

  <!-- Entry cards — click to snap to that side -->
  <div id="label-community" class="comp-label"
    role="button" tabindex="0"
    aria-label="View community repairs side">
    <span class="label-icon">🔧</span>
    <div class="label-body">
      <span class="label-title">Local Repairs</span>
      <span class="label-sub">Quick help · No jargon · Sunbury</span>
    </div>
    <span class="label-caret">◄</span>
  </div>

  <div id="label-professional" class="comp-label"
    role="button" tabindex="0"
    aria-label="View professional services side">
    <span class="label-caret">►</span>
    <div class="label-body">
      <span class="label-title">Professional Services</span>
      <span class="label-sub">Systems · Websites · Automation</span>
    </div>
    <span class="label-icon">⚡</span>
  </div>

  <div id="comp-hint">← drag to compare →</div>

  <script>
    var community    = document.getElementById('frame-community');
    var professional = document.getElementById('frame-professional');
    var sliderEl     = document.getElementById('comp-slider');
    var labelLeft    = document.getElementById('label-community');
    var labelRight   = document.getElementById('label-professional');
    var hintEl       = document.getElementById('comp-hint');

    var pos      = 50;
    var dragging = false;

    /* ---- Apply slider position ---- */
    function applyPos(pct, animate) {
      pos = Math.max(2, Math.min(98, pct));
      if (animate) {
        professional.style.transition = 'clip-path 380ms cubic-bezier(0.2,0.7,0.2,1)';
        sliderEl.style.transition     = 'left 380ms cubic-bezier(0.2,0.7,0.2,1)';
        setTimeout(function() {
          professional.style.transition = '';
          sliderEl.style.transition     = '';
        }, 400);
      }
      professional.style.clipPath = 'inset(0 0 0 ' + pos + '%)';
      sliderEl.style.left         = pos + '%';
      // Labels: mobile = both visible with active-tab state; desktop = one at a time
      if (window.innerWidth <= 768) {
        labelLeft.style.opacity  = '';
        labelRight.style.opacity = '';
        labelLeft.classList.toggle('active-tab',  pos <= 50);
        labelRight.classList.toggle('active-tab', pos > 50);
      } else {
        labelLeft.classList.remove('active-tab');
        labelRight.classList.remove('active-tab');
        labelLeft.style.opacity  = (pos <= 50 && pos > 6)   ? '1' : '0';
        labelRight.style.opacity = (pos >= 50 && pos < 94) ? '1' : '0';
      }
      sliderEl.setAttribute('aria-valuenow', Math.round(pos));
    }

    function pctFromX(clientX) {
      return (clientX / window.innerWidth) * 100;
    }

    /* ---- Mouse drag ---- */
    sliderEl.addEventListener('mousedown', function(e) {
      e.preventDefault();
      dragging = true;
      sliderEl.classList.add('active');
      community.style.pointerEvents    = 'none';
      professional.style.pointerEvents = 'none';
      hintEl.style.opacity = '0';
    });

    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      applyPos(pctFromX(e.clientX));
    });

    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      sliderEl.classList.remove('active');
      community.style.pointerEvents    = '';
      professional.style.pointerEvents = '';
    });

    /* ---- Touch drag ---- */
    sliderEl.addEventListener('touchstart', function(e) {
      e.preventDefault();
      dragging = true;
      sliderEl.classList.add('active');
      community.style.pointerEvents    = 'none';
      professional.style.pointerEvents = 'none';
      hintEl.style.opacity = '0';
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      e.preventDefault();
      applyPos(pctFromX(e.touches[0].clientX));
    }, { passive: false });

    document.addEventListener('touchend', function() {
      if (!dragging) return;
      dragging = false;
      sliderEl.classList.remove('active');
      community.style.pointerEvents    = '';
      professional.style.pointerEvents = '';
    });

    /* ---- Keyboard accessibility ---- */
    sliderEl.setAttribute('tabindex', '0');
    sliderEl.addEventListener('keydown', function(e) {
      var step = e.shiftKey ? 10 : 2;
      if (e.key === 'ArrowLeft')  { applyPos(pos - step, true); e.preventDefault(); }
      if (e.key === 'ArrowRight') { applyPos(pos + step, true); e.preventDefault(); }
    });

    /* ---- Label click — snap to that side ---- */
    labelLeft.addEventListener('click', function() {
      applyPos(8, true);
      hintEl.style.opacity = '0';
    });
    labelLeft.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { applyPos(8, true); e.preventDefault(); }
    });

    labelRight.addEventListener('click', function() {
      applyPos(92, true);
      hintEl.style.opacity = '0';
    });
    labelRight.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { applyPos(92, true); e.preventDefault(); }
    });

    /* ---- Scroll sync — zero-latency relay, no feedback loop ---- *
     *
     * Each iframe posts { jgcScroll: y } only when its own _sync flag
     * is false (i.e. the scroll came from the real user, not from us).
     * We relay immediately to the other frame. The receiving frame uses
     * scrollTo({ behavior:'instant' }) which overrides scroll-behavior:smooth
     * so there is no mid-animation interruption causing wobble.
     * Dedup skips relays where the position hasn't meaningfully changed.
     */
    var _lastRelayedY = -1;
    window.addEventListener('message', function(e) {
      if (!e.data || e.data.jgcScroll === undefined) return;
      var y = e.data.jgcScroll;
      if (Math.abs(y - _lastRelayedY) < 1) return; // skip sub-pixel noise
      _lastRelayedY = y;
      var sender = e.source;
      var target = (sender === community.contentWindow)
        ? professional.contentWindow
        : community.contentWindow;
      if (target) target.postMessage({ jgcSync: y }, '*');
    });

    /* ---- Init ---- */
    var isMob = window.innerWidth <= 768;
    if (isMob) hintEl.textContent = '← tap labels to switch →';
    applyPos(50);

    /* ---- Resize: re-evaluate mobile state ---- */
    window.addEventListener('resize', function() {
      var nowMob = window.innerWidth <= 768;
      hintEl.textContent = nowMob ? '← tap labels to switch →' : '← drag to compare →';
      applyPos(pos);
    });
  </script>
</body>
</html>
