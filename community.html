  <!-- Scroll sync with comparison wrapper (rAF-based, no feedback loop) -->
  <script>
    (function() {
      var _sync  = false;
      var _lastY = -1;

      window.addEventListener('scroll', function() {
        if (_sync) return;
        var y = window.scrollY;
        if (Math.abs(y - _lastY) < 1) return; // ignore sub-pixel jitter
        _lastY = y;
        if (window.parent !== window) {
          window.parent.postMessage({ jgcScroll: y }, '*');
        }
      }, { passive: true });

      window.addEventListener('message', function(e) {
        if (e.data && e.data.jgcSync !== undefined) {
          _sync  = true;
          _lastY = e.data.jgcSync;
          // 'instant' overrides scroll-behavior:smooth from premium.css —
          // without this the browser animates to the target and the next
          // sync message interrupts it mid-animation, causing wobble.
          window.scrollTo({ top: e.data.jgcSync, behavior: 'instant' });
          requestAnimationFrame(function() {
            requestAnimationFrame(function() { _sync = false; });
          });
        }
      });
    })();
  </script>

    function useReveal() {
      React.useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        const io = new IntersectionObserver((entries) => {
          for (const e of entries) {
            if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
          }
        }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

        const el = ref.current; if (!el) return;

        const onMove = (ev) => {
          const r = el.getBoundingClientRect();
          const x = (ev.clientX - r.left) / r.width - 0.5;
          const y = (ev.clientY - r.top) / r.height - 0.5;
          el.style.setProperty("--tilt-y", (x * 14) + "deg");
          el.style.setProperty("--tilt-x", (-y * 14) + "deg");
          el.style.setProperty("--plx-x", (x * 18) + "px");
          el.style.setProperty("--plx-y", (y * 18) + "px");
        };
        const onLeave = () => {
          el.style.setProperty("--tilt-y", "0deg");
          el.style.setProperty("--tilt-x", "0deg");
          el.style.setProperty("--plx-x", "0px");
          el.style.setProperty("--plx-y", "0px");
        };
        window.addEventListener("mousemove", onMove);
        el.addEventListener("mouseleave", onLeave);
        return () => { window.removeEventListener("mousemove", onMove); el.removeEventListener("mouseleave", onLeave); };
      }, []);
      React.useEffect(() => {
        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        const moods = ["idle", "smile", "curious"];

        const x = (ev.clientX - r.left) / r.width - 0.5;
        const y = (ev.clientY - r.top) / r.height - 0.5;
        el.style.setProperty("--tx", (-y * 6) + "deg");

        el.style.setProperty("--gx", ((ev.clientX - r.left) / r.width) * 100 + "%");
        el.style.setProperty("--gy", ((ev.clientY - r.top) / r.height) * 100 + "%");
      };
      const leave = () => {
        const el = ref.current; if (!el) return;
        el.style.setProperty("--tx", "0deg");
        el.style.setProperty("--ty", "0deg");
      };
      return (
        <div ref={ref} className={"bento-card " + size + " reveal"} onMouseMove={tilt} onMouseLeave={leave}>

    function StepScene({ scene, active }) {

    function HowItWorks() {
      const [active, setActive] = React.useState(0);
      const refs = React.useRef([]);
      React.useEffect(() => {
        const update = () => {
          const viewportFocus = window.innerHeight * 0.48;
          let bestIndex = 0;
          let bestDistance = Infinity;
          refs.current.forEach((el, idx) => {
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const center = rect.top + rect.height * 0.42;
            const distance = Math.abs(center - viewportFocus);
            const visible = rect.bottom > window.innerHeight * 0.18 && rect.top < window.innerHeight * 0.78;
            if (visible && distance < bestDistance) {
              bestDistance = distance;
              bestIndex = idx;
            }
          });
          setActive(bestIndex);
        };
        update();
        window.addEventListener("scroll", update, { passive: true });
        window.addEventListener("resize", update);
        return () => {
          window.removeEventListener("scroll", update);
          window.removeEventListener("resize", update);
        };
      }, []);
      return (
        <section id="process" className="how">
          <div className="container">
            <div className="section-head reveal">
              <span className="num">02 — How it works</span>
              <h2>Simple.<br />Just <span style={{ color: "var(--jgc-glow-300)" }}>describe the problem — I'll handle the rest.</span></h2>

                       className={"step" + (i === active ? " active" : "")}>
                    <span className="stepnum">{s.n}</span>
                    <h3>{s.t}</h3>
                    <p>{s.b}</p>
                  </div>
                ))}
              </div>
              <div>
                <div className="stick">
                  <div className="stick-card">
                    <span className="stepnum">{STEPS[active].n}</span>
                    <StepScene scene={STEPS[active].scene} active={active} />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }
